<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- 顶部工具条 -->
    <div class="toolbar">
      <span class="tb-icon menu-icon" title="菜单">&#9776;</span>
      <span class="tb-sep"></span>
      <span class="tb-icon active" title="色环">&#9673;</span>
      <span class="tb-icon" title="网格">&#9638;</span>
      <span class="tb-icon" title="三角取色器">&#9650;</span>
      <span class="tb-icon" title="方形取色器">&#9645;</span>
      <span class="tb-icon" title="圆形取色器">&#9711;</span>
      <span class="tb-icon" title="三角取色器">&#9650;</span>
      <span class="toolbar-spacer"></span>
      <span class="sampler-light" id="samplerLight" title="取色采样器"></span>
    </div>

    <!-- 色环 + 方形取色器 -->
    <div class="wheel-section">
      <div id="wheel" class="color-picker">
        <img class="hue-ring" id="hueRing" src="assets/hue-ring.png" />
        <div class="sv-square" id="svSquare"></div>
        <span class="picker-marker hue-marker" id="hueMarker"></span>
        <span class="picker-marker sv-marker" id="svMarker"></span>
      </div>

      <div class="wheel-footer">
        <div class="fg-col">
          <div class="fgbg">
            <div class="sw-bg" id="swBg" title="背景色 / 白"></div>
            <div class="sw-fg" id="swFg" title="前景色"></div>
          </div>
        </div>
        <div class="readout-col">
          <div class="readout" id="readout"></div>
          <div class="hexout" id="hexout">#FFFFFF</div>
          <button class="play" id="applyBtn" title="应用到前景色">&#9654;</button>
        </div>
      </div>
    </div>

    <!-- 颜色滑块 -->
    <div class="sliders-section">
      <div class="section-header"><span class="tb-icon sh-icon">&#9776;</span>颜色滑块</div>

      <div class="slider-group">
        <div class="group-tag">RGB</div>
        <div class="group-rows" id="rowsRgb"></div>
      </div>

      <div class="slider-group">
        <div class="group-tag">HSV</div>
        <div class="group-rows" id="rowsHsv"></div>
      </div>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
