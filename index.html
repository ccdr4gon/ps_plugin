<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- 顶部工具条（装饰，模拟 PS 面板标签） -->
    <div class="toolbar">
      <span class="tb-icon">&#9776;</span>
      <span class="tb-icon active">&#9673;</span>
      <span class="tb-icon">&#9638;</span>
      <span class="tb-icon">&#9968;</span>
      <span class="tb-icon">&#9645;</span>
      <span class="tb-icon">&#9711;</span>
      <span class="tb-icon">&#9968;</span>
    </div>

    <!-- 色环 + 方形取色器 -->
    <div class="wheel-section">
      <canvas id="wheel" width="220" height="220"></canvas>

      <div class="wheel-footer">
        <div class="fg-col">
          <div class="fgbg">
            <div class="sw-bg" id="swBg" title="背景色 / 白"></div>
            <div class="sw-fg" id="swFg" title="前景色"></div>
          </div>
          <div class="sw-transparent" title="透明"></div>
        </div>
        <div class="readout-col">
          <span id="readout">H 65 S 50 V 51</span>
          <button class="play" id="applyBtn" title="应用到前景色">&#9654;</button>
        </div>
      </div>
    </div>

    <!-- 颜色滑块 -->
    <div class="sliders-section">
      <div class="section-header"><span class="tb-icon">&#9776;</span>&nbsp;颜色滑块</div>

      <div class="slider-group">
        <div class="group-label"><span>RGB</span></div>
        <div class="group-rows" id="rowsRgb"></div>
      </div>

      <div class="group-divider"></div>

      <div class="slider-group">
        <div class="group-label"><span>HSV</span></div>
        <div class="group-rows" id="rowsHsv"></div>
      </div>
    </div>

    <!-- 底部色板 -->
    <div class="bottom-swatches">
      <div class="bsw current" id="bswCurrent" title="当前颜色（点击应用）"></div>
      <div class="bsw white" id="bswWhite" title="白色"></div>
      <div class="bsw transparent" title="透明"></div>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
