<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: #383838;
      color: #ddd;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 12px;
    }
    h3 { margin: 0 0 8px; font-size: 13px; color: #fff; }
    .status {
      padding: 6px 8px;
      background: #2b2b2b;
      border: 1px solid #1c1c1c;
      border-radius: 3px;
      margin-bottom: 10px;
      min-height: 16px;
      word-break: break-all;
    }
    button {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 7px;
      background: #4a4a4a;
      color: #eee;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #565656; }
    .swatch {
      width: 100%;
      height: 40px;
      margin-top: 10px;
      border: 1px solid #1c1c1c;
      border-radius: 3px;
      background: #000;
    }
  </style>
</head>
<body>
  <h3>UXP 测试插件</h3>
  <div class="status" id="status">初始化…</div>
  <button id="btnRead">① 读取 PS 前景色</button>
  <button id="btnRed">② 设前景色 = 红</button>
  <div class="swatch" id="swatch"></div>
  <script src="main.js"></script>
</body>
</html>
